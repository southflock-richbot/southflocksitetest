    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Southflock | Motion Narrative</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            :root {
                --bg-color: #000000;
                --accent-blue: #3b82f6;
            }

            body {
                background-color: var(--bg-color);
                margin: 0;
                overflow: hidden;
            }

            /* The Animation Container */
            .stage {
                perspective: 1000px;
            }

            /* ANIMATOR'S KEY: 
           Using a "swing" motion instead of a 360 loop for a more cinematic feel 
        */
            @keyframes swing-rotate {
                0% {
                    transform: rotate(-15deg) scale(0.95);
                    opacity: 0.1;
                }

                50% {
                    transform: rotate(15deg) scale(1.05);
                    opacity: 0.4;
                }

                100% {
                    transform: rotate(-15deg) scale(0.95);
                    opacity: 0.1;
                }
            }

            @keyframes drift {
                0% {
                    transform: translate(0, 0);
                }

                50% {
                    transform: translate(2%, 1%);
                }

                100% {
                    transform: translate(0, 0);
                }
            }

            .anim-rect {
                position: absolute;
                transform-origin: center center;
                animation: swing-rotate var(--duration) cubic-bezier(0.45, 0, 0.55, 1) infinite;
                will-change: transform, opacity;
            }

            /* Depth of Field Classes */
            .layer-foreground {
                filter: blur(0px);
                z-index: 3;
            }

            .layer-midground {
                filter: blur(4px);
                z-index: 2;
            }

            .layer-background {
                filter: blur(12px);
                z-index: 1;
            }

            /* The "Scanline" Texture */
            .scanlines {
                background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 50%);
                background-size: 100% 4px;
            }
        </style>
    </head>

    <body>

            <div class="absolute inset-0 scanlines opacity-20 pointer-events-none z-50"></div>
